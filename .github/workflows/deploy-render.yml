name: Deploy Backend to Render

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-render.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore backend/CUST.EMITRA.RK.Api/CUST.EMITRA.RK.Api.csproj

      - name: Build
        run: dotnet build backend/CUST.EMITRA.RK.Api/CUST.EMITRA.RK.Api.csproj --configuration Release --no-restore

      - name: Trigger Render Deploy Hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "Missing secret RENDER_DEPLOY_HOOK_URL" >&2
            exit 1
          fi
          curl --fail --show-error --silent -X POST "$RENDER_DEPLOY_HOOK_URL"
