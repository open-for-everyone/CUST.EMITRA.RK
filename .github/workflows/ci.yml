name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend build and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore backend/CUST.EMITRA.RK.Api/CUST.EMITRA.RK.Api.csproj

      - name: Build
        run: dotnet build backend/CUST.EMITRA.RK.Api/CUST.EMITRA.RK.Api.csproj --no-restore

      - name: Test
        run: dotnet test backend/CUST.EMITRA.RK.Api/CUST.EMITRA.RK.Api.csproj --no-build

  frontend:
    name: Frontend build and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test -- --watch=false --browsers=ChromeHeadless
