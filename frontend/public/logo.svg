<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-labelledby="title desc">
  <title id="title">RK Online Centre Logo</title>
  <desc id="desc">Rounded gradient badge with RK text</desc>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
  </defs>
  <rect x="6" y="6" width="108" height="108" rx="24" fill="url(#g)" />
  <text x="60" y="56" text-anchor="middle" font-size="36" font-family="Inter, Arial, sans-serif" font-weight="700" fill="#fff">RK</text>
  <text x="60" y="78" text-anchor="middle" font-size="11" font-family="Inter, Arial, sans-serif" fill="#dbeafe">ONLINE</text>
</svg>
