<section class="card wide">
  <h2>Your Activity</h2>
  @if (!isLoggedIn) {
    <p>Login to view activity.</p>
  } @else if (loading) {
    <p>Loading activity...</p>
  } @else {
    <ul>
      @for (item of items; track item.createdAtUtc) {
        <li>{{ item.action }} - {{ item.metadata || '-' }} - {{ item.createdAtUtc | date:'medium' }}</li>
      }
    </ul>
  }
</section>
