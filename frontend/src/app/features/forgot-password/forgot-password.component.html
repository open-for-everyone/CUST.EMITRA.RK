<main class="container page">
  <section class="card wide forgot-password-card">
    <h2>{{ language.t('forgotPasswordTitle') }}</h2>
    <p>{{ language.t('forgotPasswordDesc') }}</p>

    @if (successMessage()) {
      <p class="success-message">{{ successMessage() }}</p>
    }
    @if (errorMessage()) {
      <p class="auth-error">{{ errorMessage() }}</p>
    }

    @if (!successMessage()) {
      <form class="form" (ngSubmit)="submit()">
        <input
          [(ngModel)]="email"
          name="email"
          type="email"
          autocomplete="email"
          required
          [placeholder]="language.t('authEmail')"
        />
        <button class="btn" type="submit" [disabled]="loading()">{{ language.t('forgotPasswordSubmit') }}</button>
      </form>
    }

    <a class="forgot-link" routerLink="/">{{ language.t('forgotPasswordBack') }}</a>
  </section>
</main>

<app-footer />
