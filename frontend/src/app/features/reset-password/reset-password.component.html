<main class="container page">
  <section class="card wide reset-password-card">
    <h2>{{ language.t('resetPasswordTitle') }}</h2>
    <p>{{ language.t('resetPasswordDesc') }}</p>

    @if (successMessage()) {
      <p class="success-message">{{ successMessage() }}</p>
      <p><a class="forgot-link" routerLink="/">{{ language.t('navLogin') }}</a></p>
    }
    @if (errorMessage()) {
      <p class="auth-error">{{ errorMessage() }}</p>
      <p><a class="forgot-link" routerLink="/forgot-password">{{ language.t('forgotPasswordLink') }}</a></p>
    }

    @if (!successMessage() && token) {
      <form class="form" (ngSubmit)="submit()">
        <input
          [(ngModel)]="newPassword"
          name="newPassword"
          type="password"
          autocomplete="new-password"
          minlength="6"
          required
          [placeholder]="language.t('resetPasswordNewPwd')"
        />
        <input
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          type="password"
          autocomplete="new-password"
          minlength="6"
          required
          [placeholder]="language.t('resetPasswordConfirm')"
        />
        <button class="btn" type="submit" [disabled]="loading()">{{ language.t('resetPasswordSubmit') }}</button>
      </form>
    }
  </section>
</main>

<app-footer />
